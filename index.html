<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style/main.css">
    <link rel="stylesheet" href="./style/varaible.css">
    <link rel="stylesheet" href="./style/responsive.css">
</head>
<body>
    <mian class="container">
        <section class="section-left">
            <article class="article-top">
                <header class="article-top-headear">
                    <span><svg class="hamberger" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg></span>
                    <span class="logo">Scientific</span> 
                </header>
                <div class="calculation-area"></div>
                <div class="unit">
                    <p>MC</p>
                    <p>MR</p>
                    <p>M+</p>
                    <p>M-</p>
                    <p>MS</p>
                </div>
            </article>
            <article class="article-bottom">
                <div class="function-div">
                    <p>
                        <svg class="trigo-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-triangle-right-icon lucide-triangle-right"><path d="M22 18a2 2 0 0 1-2 2H3c-1.1 0-1.3-.6-.4-1.3L20.4 4.3c.9-.7 1.6-.4 1.6.7Z"/></svg>
                        <span>Trignometry</span>
                        <svg class="trigo-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down-icon lucide-chevron-down"><path d="m6 9 6 6 6-6"/></svg>
                    </p>
                    <p>
                        <svg class="fun-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-function-icon lucide-square-function"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M9 17c2 0 2.8-1 2.8-2.8V10c0-2 1-3.3 3.2-3"/><path d="M9 11.2h5.7"/></svg>
                        <span>Function</span>
                        <svg class="fun-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down-icon lucide-chevron-down"><path d="m6 9 6 6 6-6"/></svg>
                    </p>
                </div>
                <div class="button-div">
                    <button>2<sup>nd</sup></button>
                    <button>&pi;</button>
                    <button>e</button>
                    <button>C</button>
                    <button>X</button>
                    <button>x <sup>2</sup></button>
                    <button>1/X</button>
                    <button>|X|</button>
                    <button>exp</button>
                    <button>mod</button>
                    <button>&radic;2</button>
                    <button>(</button>
                    <button>)</button>
                    <button>n!</button>
                    <button>&divide</button>
                    <button>x <sup>y</sup></button>
                    <button class="btn-num">7</button>
                    <button class="btn-num">8</button>
                    <button class="btn-num">9</button>
                    <button>&times</button>
                    <button>10 <sup>x</sup></button>
                    <button class="btn-num">4</button>
                    <button class="btn-num">5</button>
                    <button class="btn-num">6</button>
                    <button>-</button>
                    <button>log</button>
                    <button class="btn-num">1</button>
                    <button class="btn-num">2</button>
                    <button class="btn-num">3</button>
                    <button>+</button>
                    <button>ln</button>
                    <button>btn</button>
                    <button class="btn-num">0</button>
                    <button>.</button>
                    <button class="btn-equal">=</button>
                </div>
            </article>
        </section>
        <section class="section-right">
            <article class="history">history</article>
            <article class="memory">memory</article>
        </section>
    </mian>
</body>
</html>
